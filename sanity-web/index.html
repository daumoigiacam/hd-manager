<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HD Manager Sanity Check</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ecfdf5, #d1fae5);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #064e3b;
      }

      .card {
        background: white;
        padding: 32px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(6, 78, 59, 0.12);
        text-align: center;
        max-width: 420px;
        width: calc(100% - 32px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 8px 0;
        font-size: 16px;
        line-height: 1.5;
      }

      .badge {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 16px;
        border-radius: 999px;
        background: #10b981;
        color: white;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Trang Test 5190</h1>
      <p>Nếu bạn nhìn thấy trang này, IAB đang mở đúng server mới.</p>
      <p>Điều đó có nghĩa là dữ liệu và project chưa mất, và lỗi trước đó nằm ở cache/tab cũ.</p>
      <div class="badge">HD MANAGER SANITY CHECK</div>
    </div>
  </body>
  </html>
